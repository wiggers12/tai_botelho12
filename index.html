<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Espaço Tai Botelho</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1em;
    }

    button {
      background-color: #DAA520;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    #logout {
      background-color: crimson;
      margin-top: 20px;
    }

    #main-content {
      display: none;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container" id="auth-container">
    <h2>Espaço Tai Botelho</h2>
    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="password" id="password" placeholder="Sua senha">
    <button onclick="login()">Entrar</button>
    <button onclick="signup()">Criar Conta</button>
    <p id="msg" style="color:red;"></p>
  </div>

  <div id="main-content">
    <h2>Bem-vindo(a) ao sistema Tai Botelho!</h2>
    <p>Acesso liberado após login.</p>
    <button id="logout" onclick="logout()">Sair</button>
  </div>

  <script>
    // 🔐 CONFIGURAÇÃO DO FIREBASE
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "0000000000",
      appId: "APP_ID_AQUI"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 🔓 Verifica login ao carregar
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } else {
        document.getElementById('auth-container').style.display = 'block';
        document.getElementById('main-content').style.display = 'none';
      }
    });

    // Login
    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .catch(error => {
          document.getElementById('msg').textContent = error.message;
        });
    }

    // Cadastro
    function signup() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .catch(error => {
          document.getElementById('msg').textContent = error.message;
        });
    }

    // Logout
    function logout() {
      auth.signOut();
    }
  </script>
</body>
</html>
