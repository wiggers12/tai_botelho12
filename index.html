<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espaço Tai Botelho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      visibility: hidden; /* Evita FOUC */
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-initials {
      font-size: 8em;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #FFD700, #DAA520, #B8860B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.5);
      letter-spacing: 5px;
    }

    .splash-full-name {
      color: #FFD700;
      font-size: 2.5em;
      font-weight: 600;
      margin-top: 10px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      letter-spacing: 1px;
    }

    #splash-enter-button {
      background: linear-gradient(45deg, #FFD700, #DAA520);
      color: #000;
      padding: 10px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.2em;
      font-weight: 700;
      margin-top: 40px;
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.5px;
    }

    #splash-enter-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
    }

    #main-content {
      padding: 20px;
      text-align: center;
      background-color: #f0f0f0;
      min-height: 100vh;
      box-sizing: border-box;
      display: none;
    }

    @media (max-width: 768px) {
      .splash-initials {
        font-size: 5em;
      }
      .splash-full-name {
        font-size: 1.8em;
      }
      #splash-enter-button {
        font-size: 1em;
        padding: 8px 20px;
        margin-top: 30px;
      }
    }
  </style>

  <script>
    // Torna o conteúdo visível após o DOM estar pronto
    document.addEventListener("DOMContentLoaded", () => {
      document.body.style.visibility = "visible";
    });
  </script>
</head>
<body>
  <div id="splash-screen">
    <h1 class="splash-initials">TB</h1>
    <p class="splash-full-name">Espaço Tai Botelho</p>
    <button id="splash-enter-button" aria-label="Entrar no site" role="button">Comece aqui</button>
  </div>

  <div id="main-content">
    <h1>Bem-vindo ao Espaço Tai Botelho!</h1>
    <p>Este é o conteúdo principal do seu site. Em breve, teremos novidades incríveis!</p>
    <p>Explore, agende e aproveite sua beleza com sofisticação.</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const splash = document.getElementById("splash-screen");
      const button = document.getElementById("splash-enter-button");
      const main = document.getElementById("main-content");

      const showMain = () => {
        if (!splash.classList.contains("hidden")) {
          splash.classList.add("hidden");
          splash.addEventListener(
            "transitionend",
            () => {
              splash.style.display = "none";
              main.style.display = "block";
              document.body.style.overflow = "auto";
            },
            { once: true }
          );
        }
      };

      // Ao clicar no botão
      button.addEventListener("click", showMain);

      // Ou após 6 segundos automaticamente
      setTimeout(showMain, 6000);
    });
  </script>
</body>
</html>
