<script>
    // --- FUNÇÕES DE UTILIDADE ---
    function getClientes() {
      return JSON.parse(localStorage.getItem('clientes')) || [];
    }

    function salvarClientes(clientes) {
      localStorage.setItem('clientes', JSON.stringify(clientes));
    }

    function getAgendamentos() {
      return JSON.parse(localStorage.getItem('agendamentos')) || [];
    }

    function salvarAgendamentos(agendamentos) {
      localStorage.setItem('agendamentos', JSON.stringify(agendamentos));
    }

    function getDespesas() {
        return JSON.parse(localStorage.getItem('despesas')) || [];
    }

    function salvarDespesas(despesas) {
        localStorage.setItem('despesas', JSON.stringify(despesas));
    }

    function getReceitas() {
        return JSON.parse(localStorage.getItem('receitas')) || [];
    }

    function salvarReceitas(receitas) {
        localStorage.setItem('receitas', JSON.stringify(receitas));
    }

    // --- FUNÇÃO PARA EXIBIR FEEDBACK ---
    let feedbackTimeout;
    function showFeedback(elementId, message, type) {
        const feedbackDiv = document.getElementById('feedback-message'); // Usar um único div de feedback fixo
        clearTimeout(feedbackTimeout); // Limpa qualquer timeout anterior

        feedbackDiv.textContent = message;
        feedbackDiv.className = 'feedback-message show ' + type;

        feedbackTimeout = setTimeout(() => {
            feedbackDiv.classList.remove('show');
            setTimeout(() => {
                feedbackDiv.textContent = '';
                feedbackDiv.className = 'feedback-message'; 
            }, 500);
        }, 5000);
    }

    // --- MODAL DE CONFIRMAÇÃO ---
    const confirmModal = document.getElementById('confirm-modal');
    const modalMessage = document.getElementById('modal-message');
    const modalConfirmBtn = document.getElementById('modal-confirm-btn');
    const modalCancelBtn = document.getElementById('modal-cancel-btn');

    let onConfirmCallback; // Para armazenar a função a ser executada na confirmação

    function showConfirmModal(message, callback) {
        modalMessage.textContent = message;
        onConfirmCallback = callback;
        confirmModal.classList.add('visible');
    }

    function hideConfirmModal() {
        confirmModal.classList.remove('visible');
        onConfirmCallback = null;
    }

    modalConfirmBtn.addEventListener('click', () => {
        if (onConfirmCallback) {
            onConfirmCallback();
        }
        hideConfirmModal();
    });

    modalCancelBtn.addEventListener('click', () => {
        hideConfirmModal();
    });

    confirmModal.addEventListener('click', (e) => {
        if (e.target === confirmModal) { // Fecha o modal clicando fora
            hideConfirmModal();
        }
    });


    // --- CONTROLE DO MENU E SEÇÕES ---
    const contentSections = document.querySelectorAll('.content-section');
    const submenuClientes = document.getElementById('submenu-clientes');
    const menuClientes = document.getElementById('menu-clientes');
    const submenuFinanceiro = document.getElementById('submenu-financeiro');
    const menuFinanceiro = document.getElementById('menu-financeiro');

    function hideAllSections() {
      contentSections.forEach(section => {
        section.classList.remove('active');
      });
      document.querySelectorAll('nav ul li a').forEach(link => { 
        link.classList.remove('active');
      });
      // Esconde todos os submenus ao mudar de seção principal
      submenuClientes.classList.remove('active');
      submenuFinanceiro.classList.remove('active');
    }

    function showSection(sectionId, activeLink) {
      hideAllSections();
      const targetSection = document.getElementById(sectionId);
      if (targetSection) {
        targetSection.classList.add('active');
      }
      if (activeLink) {
        activeLink.classList.add('active');
      }
    }

    function showFinanceSubSection(subSectionId) {
        document.querySelectorAll('.finance-sub-section').forEach(sub => {
            sub.style.display = 'none';
        });
        const targetSub = document.getElementById(subSectionId);
        if (targetSub) {
            targetSub.style.display = 'block';
        }
    }


    // Lógica para o menu principal "Clientes" e seu submenu
    menuClientes.addEventListener('click', (e) => {
        e.preventDefault();
        submenuClientes.classList.toggle('active'); 
        submenuFinanceiro.classList.remove('active'); // Garante que o submenu de finanças está fechado
        hideAllSections(); 
        menuClientes.classList.toggle('active');
    });

    // Adiciona event listeners para os links do submenu de Clientes
    const subMenuClientesLinks = submenuClientes.querySelectorAll('a');
    subMenuClientesLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            menuClientes.classList.add('active'); 
            const id = link.id;
            
            switch (id) {
                case 'menu-cadastro-clientes':
                    showSection('section-cadastro-clientes', link);
                    resetClienteForm(); // Limpa o formulário ao ir para cadastro
                    break;
                case 'menu-agendamento-cliente':
                    showSection('section-agendamento-cliente', link);
                    resetAgendamentoForm(); // Limpa o formulário ao ir para agendamento
                    atualizarListasDeClientes();
                    break;
                case 'menu-consultar-agendamentos':
                    showSection('section-consultar-agendamentos', link);
                    document.getElementById('search-agendamentos').value = ''; // Limpa busca
                    exibirAgendamentosParaConsulta();
                    break;
                case 'menu-historico-procedimentos':
                    showSection('section-historico-procedimentos', link);
                    atualizarListasDeClientes();
                    document.getElementById('historico-detalhes-cliente').innerHTML = '<p>Selecione um cliente acima para ver ou adicionar procedimentos.</p>';
                    document.getElementById('select-cliente-historico').value = '';
                    break;
            }
        });
    });

    // Lógica para o menu principal "Financeiro" e seu submenu
    menuFinanceiro.addEventListener('click', (e) => {
        e.preventDefault();
        submenuFinanceiro.classList.toggle('active'); 
        submenuClientes.classList.remove('active'); // Garante que o submenu de clientes está fechado
        hideAllSections(); 
        menuFinanceiro.classList.toggle('active');
        // Ao clicar no menu principal Financeiro, mostra a primeira subseção por padrão
        showFinanceSubSection('sub-section-registrar-receita');
        showSection('section-financeiro', menuFinanceiro); // Ativa a seção principal 'section-financeiro'
        resetReceitaForm(); // Limpa o form de receita
        resetDespesaForm(); // Limpa o form de despesa
    });

    // Adiciona event listeners para os links do submenu de Financeiro
    const subMenuFinanceiroLinks = submenuFinanceiro.querySelectorAll('a');
    subMenuFinanceiroLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            menuFinanceiro.classList.add('active'); 
            showSection('section-financeiro', link); // Ativa a seção principal Financeiro
            const id = link.id;
            
            switch (id) {
                case 'menu-registrar-receita':
                    showFinanceSubSection('sub-section-registrar-receita');
                    resetReceitaForm();
                    break;
                case 'menu-registrar-despesa':
                    showFinanceSubSection('sub-section-registrar-despesa');
                    resetDespesaForm();
                    break;
                case 'menu-extrato-financeiro':
                    showFinanceSubSection('sub-section-extrato-financeiro');
                    // Carrega o extrato com filtros padrão (todo o período)
                    document.getElementById('filter-period').value = 'all';
                    document.getElementById('filter-date-container').style.display = 'none';
                    document.getElementById('search-extrato').value = ''; // Limpa busca
                    carregarExtratoFinanceiro(); 
                    break;
            }
        });
    });

    // --- AGENDAMENTO ---
    const formAgendamento = document.getElementById('form-agendamento');
    const btnSubmitAgendamento = document.getElementById('btn-submit-agendamento');
    const agendamentoIdEdit = document.getElementById('agendamento-id-edit');

    function resetAgendamentoForm() {
        formAgendamento.reset();
        agendamentoIdEdit.value = '';
        btnSubmitAgendamento.textContent = 'Agendar';
        document.getElementById('feedback-agendamento').className = 'feedback-message';
    }

    formAgendamento.addEventListener('submit', function (e) {
      e.preventDefault();

      const clienteId = document.getElementById('cliente').value; 
      const servico = document.getElementById('servico').value.trim();
      const datahora = document.getElementById('datahora').value;
      const profissional = document.getElementById('profissional').value.trim();
      const idEdit = agendamentoIdEdit.value;

      if (!clienteId || !servico || !datahora || !profissional) {
        showFeedback('feedback-agendamento', 'Por favor, preencha todos os campos obrigatórios para o agendamento.', 'error');
        return;
      }

      const clientes = getClientes();
      const clienteSelecionado = clientes.find(c => c.id === clienteId);
      const clienteNome = clienteSelecionado ? clienteSelecionado.nome : 'Cliente Desconhecido';

      let agendamentos = getAgendamentos();

      if (idEdit) {
        // Modo de edição
        const agendamentoIndex = agendamentos.findIndex(a => a.id === idEdit);
        if (agendamentoIndex > -1) {
            agendamentos[agendamentoIndex] = { ...agendamentos[agendamentoIndex], clienteId, cliente: clienteNome, servico, datahora, profissional };
            showFeedback('feedback-agendamento', `✅ Agendamento atualizado para ${clienteNome}!`, 'success');
        } else {
            showFeedback('feedback-agendamento', 'Erro ao atualizar agendamento: ID não encontrado.', 'error');
            return;
        }
      } else {
        // Modo de cadastro
        const novoAgendamento = { id: Date.now().toString(), clienteId, cliente: clienteNome, servico, datahora, profissional };
        agendamentos.push(novoAgendamento);
        showFeedback('feedback-agendamento', `✅ Agendamento confirmado para ${clienteNome} em ${new Date(datahora).toLocaleString('pt-BR')}.`, 'success');
        
        if (clienteSelecionado && clienteSelecionado.telefone) {
            const mensagemTexto = `Olá ${clienteNome}, seu agendamento para ${servico} com ${profissional} foi confirmado para ${new Date(datahora).toLocaleString('pt-BR')}.`;
            const linkWhatsApp = `https://wa.me/55${clienteSelecionado.telefone.replace(/\D/g, '')}?text=${encodeURIComponent(mensagemTexto)}`;
            window.open(linkWhatsApp, '_blank');
        }
      }
      salvarAgendamentos(agendamentos);
      resetAgendamentoForm();
      exibirAgendamentosParaConsulta(); // Atualiza a lista de agendamentos
    });

    function editarAgendamento(id) {
        const agendamentos = getAgendamentos();
        const agendamento = agendamentos.find(a => a.id === id);

        if (agendamento) {
            // Preenche o formulário com os dados do agendamento
            document.getElementById('cliente').value = agendamento.clienteId;
            document.getElementById('servico').value = agendamento.servico;
            document.getElementById('datahora').value = agendamento.datahora;
            document.getElementById('profissional').value = agendamento.profissional;
            agendamentoIdEdit.value = agendamento.id; // Salva o ID para edição
            btnSubmitAgendamento.textContent = 'Atualizar Agendamento';
            showSection('section-agendamento-cliente', document.getElementById('menu-agendamento-cliente'));
            atualizarListasDeClientes(); // Garante que o select de cliente está preenchido
        } else {
            showFeedback('feedback-agendamento', 'Agendamento não encontrado para edição.', 'error');
        }
    }

    function excluirAgendamento(id) {
        showConfirmModal('Tem certeza que deseja excluir este agendamento?', () => {
            let agendamentos = getAgendamentos();
            const agendamentoIndex = agendamentos.findIndex(a => a.id === id);

            if (agendamentoIndex > -1) {
                agendamentos.splice(agendamentoIndex, 1);
                salvarAgendamentos(agendamentos);
                showFeedback('feedback-agendamento', '✅ Agendamento excluído com sucesso!', 'success');
                exibirAgendamentosParaConsulta(); // Atualiza a lista
            } else {
                showFeedback('feedback-agendamento', 'Erro ao excluir agendamento: ID não encontrado.', 'error');
            }
        });
    }

    // --- CADASTRO DE CLIENTES ---
    const formCliente = document.getElementById('form-cliente');
    const btnSubmitCliente = document.getElementById('btn-submit-cliente');
    const clienteIdEdit = document.getElementById('cliente-id-edit');
    const telefoneClienteInput = document.getElementById('telefone-cliente');

    // Máscara de telefone
    telefoneClienteInput.addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
        let formattedValue = '';

        if (value.length > 0) {
            formattedValue = `(${value.substring(0, 2)}`;
            if (value.length > 2) {
                formattedValue += `) ${value.substring(2, 7)}`;
                if (value.length > 7) {
                    formattedValue += `-${value.substring(7, 11)}`;
                }
            }
        }
        e.target.value = formattedValue;
    });

    function resetClienteForm() {
        formCliente.reset();
        clienteIdEdit.value = '';
        btnSubmitCliente.textContent = 'Cadastrar Cliente';
        document.getElementById('feedback-cliente').className = 'feedback-message';
    }

    formCliente.addEventListener('submit', function (e) {
      e.preventDefault();

      const nome = document.getElementById('nome-cliente').value.trim();
      const telefone = document.getElementById('telefone-cliente').value.trim();
      const idade = document.getElementById('idade-cliente').value;
      const genero = document.getElementById('genero-cliente').value;
      const clienteDesde = document.getElementById('cliente-desde').value;
      const idEdit = clienteIdEdit.value;

      if (!nome || !telefone) {
        showFeedback('feedback-cliente', 'Nome e Telefone são campos obrigatórios.', 'error');
        return;
      }

      const telefoneLimpo = telefone.replace(/\D/g, '');
      if (!/^\d{10,11}$/.test(telefoneLimpo)) { // Ajustado para 10 ou 11 dígitos (com DDD)
        showFeedback('feedback-cliente', 'Por favor, insira um número de telefone válido (ex: 51987654321).', 'error');
        return;
      }

      if (idade && (isNaN(idade) || parseInt(idade) < 0 || parseInt(idade) > 120)) {
          showFeedback('feedback-cliente', 'Por favor, insira uma idade válida (entre 0 e 120).', 'error');
          return;
      }

      let clientes = getClientes();

      if (idEdit) {
        // Modo de edição
        const clienteIndex = clientes.findIndex(c => c.id === idEdit);
        if (clienteIndex > -1) {
            clientes[clienteIndex] = { 
                ...clientes[clienteIndex], // Mantém histórico de procedimentos
                nome: nome,
                telefone: telefoneLimpo,
                idade: idade || null,
                genero: genero || null,
                clienteDesde: clienteDesde || null
            };
            showFeedback('feedback-cliente', `✅ Cliente "${nome}" atualizado com sucesso!`, 'success');
        } else {
            showFeedback('feedback-cliente', 'Erro ao atualizar cliente: ID não encontrado.', 'error');
            return;
        }
      } else {
        // Modo de cadastro
        const novoCliente = {
            id: Date.now().toString(), 
            nome: nome,
            telefone: telefoneLimpo,
            idade: idade || null,
            genero: genero || null,
            clienteDesde: clienteDesde || null,
            historicoProcedimentos: [] 
        };
        clientes.push(novoCliente);
        showFeedback('feedback-cliente', `✅ Cliente "${nome}" cadastrado com sucesso!`, 'success');
      }
      
      salvarClientes(clientes);
      resetClienteForm();
      atualizarListasDeClientes(); 
    });

    // --- ATUALIZAÇÃO DAS LISTAS DE CLIENTES (SELECTs) ---
    function atualizarListasDeClientes() {
      const selectsClientes = [
        document.getElementById('cliente'), 
        document.getElementById('select-cliente-historico') 
      ];

      const clientes = getClientes();

      selectsClientes.forEach(select => {
        if (!select) return; 

        const valorAtual = select.value; 
        select.innerHTML = '<option value="">Selecione um cliente</option>';

        clientes.forEach(cliente => {
          const option = document.createElement('option');
          option.value = cliente.id; 
          option.textContent = cliente.nome;
          select.appendChild(option);
        });

        if (valorAtual && clientes.some(c => c.id === valorAtual)) {
            select.value = valorAtual;
        }
      });
    }

    // --- CONSULTAR AGENDAMENTOS ---
    const listaAgendamentosConsulta = document.getElementById('lista-agendamentos-consulta');
    const searchAgendamentosInput = document.getElementById('search-agendamentos');

    searchAgendamentosInput.addEventListener('input', exibirAgendamentosParaConsulta);

    function exibirAgendamentosParaConsulta() {
      listaAgendamentosConsulta.innerHTML = '';
      let agendamentos = getAgendamentos();
      const searchTerm = searchAgendamentosInput.value.toLowerCase();

      // Filtrar agendamentos com base no termo de busca
      if (searchTerm) {
          agendamentos = agendamentos.filter(agendamento => 
              agendamento.cliente.toLowerCase().includes(searchTerm) ||
              agendamento.servico.toLowerCase().includes(searchTerm) ||
              agendamento.profissional.toLowerCase().includes(searchTerm) ||
              new Date(agendamento.datahora).toLocaleDateString('pt-BR').includes(searchTerm)
          );
      }

      if (agendamentos.length === 0) {
        const item = document.createElement('li');
        item.innerHTML = '<span>Nenhum agendamento encontrado.</span>';
        listaAgendamentosConsulta.appendChild(item);
      } else {
        agendamentos.sort((a, b) => new Date(b.datahora) - new Date(a.datahora));

        agendamentos.forEach(agendamento => {
          const item = document.createElement('li');
          item.innerHTML = `
            <span>Cliente: <strong>${agendamento.cliente}</strong></span>
            <span>Serviço: ${agendamento.servico}</span>
            <span>Profissional: ${agendamento.profissional}</span>
            <span>Data e Hora: ${new Date(agendamento.datahora).toLocaleString('pt-BR')}</span>
            <div class="action-buttons">
                <button class="edit" onclick="editarAgendamento('${agendamento.id}')" title="Editar Agendamento">
                    <i class="ph-bold ph-pencil"></i>
                </button>
                <button class="delete" onclick="excluirAgendamento('${agendamento.id}')" title="Excluir Agendamento">
                    <i class="ph-bold ph-trash"></i>
                </button>
            </div>
          `;
          listaAgendamentosConsulta.appendChild(item);
        });
      }
    }

    // --- HISTÓRICO DE PROCEDIMENTOS ---
    const selectClienteHistorico = document.getElementById('select-cliente-historico');
    const historicoDetalhesCliente = document.getElementById('historico-detalhes-cliente');

    selectClienteHistorico.addEventListener('change', (event) => {
        const clienteId = event.target.value;
        if (clienteId) {
            exibirHistoricoDoCliente(clienteId);
        } else {
            historicoDetalhesCliente.innerHTML = '<p>Selecione um cliente acima para ver ou adicionar procedimentos.</p>';
        }
    });

    function exibirHistoricoDoCliente(clienteId) {
        const clientes = getClientes();
        const cliente = clientes.find(c => c.id === clienteId);

        if (!cliente) {
            historicoDetalhesCliente.innerHTML = '<p>Cliente não encontrado.</p>';
            return;
        }

        historicoDetalhesCliente.innerHTML = `
            <h3>Informações e Histórico de ${cliente.nome}</h3>
            <p><strong>Telefone:</strong> ${formatarTelefone(cliente.telefone) || 'Não informado'}</p>
            <p><strong>Idade:</strong> ${cliente.idade || 'Não informada'}</p>
            <p><strong>Gênero:</strong> ${cliente.genero ? (cliente.genero === 'nao_informar' ? 'Prefiro não informar' : cliente.genero.charAt(0).toUpperCase() + cliente.genero.slice(1)) : 'Não informado'}</p>
            <p><strong>Cliente desde:</strong> ${cliente.clienteDesde ? new Date(cliente.clienteDesde + 'T00:00:00').toLocaleDateString('pt-BR') : 'Não informado'}</p>
            
            <h4>Procedimentos Realizados</h4>
            <ul id="lista-procedimentos-cliente" class="lista-itens"></ul>

            <h4>Registrar Novo Procedimento</h4>
            <form id="form-adicionar-procedimento">
                <div id="feedback-procedimento" class="feedback-message"></div>
                <input type="hidden" id="proc-id-edit">
                <label for="procData">Data:</label>
                <input type="date" id="procData" required>

                <label for="procServico">Serviço:</label>
                <input type="text" id="procServico" required>

                <label for="procValor">Valor (R$):</label>
                <input type="number" id="procValor" step="0.01" required>

                <label for="procProfissional">Profissional (Opcional):</label>
                <input type="text" id="procProfissional">

                <label for="procObs">Observacoes (Opcional):</label>
                <textarea id="procObs" rows="3"></textarea>

                <button type="submit" id="btn-submit-procedimento">Adicionar Procedimento</button>
            </form>
        `;
        const formAdicionarProcedimento = document.getElementById('form-adicionar-procedimento');
        const btnSubmitProcedimento = document.getElementById('btn-submit-procedimento');
        const procIdEdit = document.getElementById('proc-id-edit');

        // Limpar o formulário de procedimento ao carregar o histórico de um novo cliente
        formAdicionarProcedimento.reset();
        procIdEdit.value = '';
        btnSubmitProcedimento.textContent = 'Adicionar Procedimento';


        const listaProcCliente = document.getElementById('lista-procedimentos-cliente');
        if (cliente.historicoProcedimentos && cliente.historicoProcedimentos.length > 0) {
            cliente.historicoProcedimentos.sort((a, b) => new Date(b.data) - new Date(a.data));

            cliente.historicoProcedimentos.forEach(proc => {
                const item = document.createElement('li');
                item.innerHTML = `
                    <strong>Data: ${new Date(proc.data + 'T00:00:00').toLocaleDateString('pt-BR')}</strong><br>
                    <span>Serviço: ${proc.nomeServico}</span>
                    <span>Valor: R$ ${proc.valor ? proc.valor.toFixed(2) : '0.00'}</span>
                    ${proc.profissional ? `<span>Profissional: ${proc.profissional}</span>` : ''}
                    ${proc.observacoes ? `<span>Obs: ${proc.observacoes}</span>` : ''}
                    <div class="action-buttons">
                        <button class="edit" onclick="editarProcedimento('${cliente.id}', '${proc.id}')" title="Editar Procedimento">
                            <i class="ph-bold ph-pencil"></i>
                        </button>
                        <button class="delete" onclick="excluirProcedimento('${cliente.id}', '${proc.id}')" title="Excluir Procedimento">
                            <i class="ph-bold ph-trash"></i>
                        </button>
                    </div>
                `;
                listaProcCliente.appendChild(item);
            });
        } else {
            listaProcCliente.innerHTML = '<li><span>Nenhum procedimento registrado para este cliente.</span></li>';
        }

        // Remover e adicionar o listener para evitar múltiplos listeners
        if (formAdicionarProcedimento._submitListener) {
            formAdicionarProcedimento.removeEventListener('submit', formAdicionarProcedimento._submitListener);
        }
        const newSubmitListener = (event) => {
            event.preventDefault();
            adicionarOuAtualizarProcedimentoDoCliente(clienteId, formAdicionarProcedimento);
        };
        formAdicionarProcedimento.addEventListener('submit', newSubmitListener);
        formAdicionarProcedimento._submitListener = newSubmitListener;
    }

    function adicionarOuAtualizarProcedimentoDoCliente(clienteId, form) {
        const clientes = getClientes();
        const clienteIndex = clientes.findIndex(c => c.id === clienteId);

        if (clienteIndex === -1) {
            showFeedback('feedback-procedimento', 'Erro: Cliente não encontrado para adicionar/atualizar procedimento.', 'error');
            return;
        }

        const data = form.elements['procData'].value;
        const nomeServico = form.elements['procServico'].value.trim();
        const valor = parseFloat(form.elements['procValor'].value);
        const profissional = form.elements['procProfissional'].value.trim();
        const observacoes = form.elements['procObs'].value.trim();
        const procId = form.elements['proc-id-edit'].value;

        if (!data || !nomeServico || isNaN(valor) || valor < 0) {
            showFeedback('feedback-procedimento', 'Por favor, preencha a Data, o Serviço e o Valor válido para o procedimento.', 'error');
            return;
        }

        if (procId) { // Editando procedimento existente
            const procIndex = clientes[clienteIndex].historicoProcedimentos.findIndex(p => p.id === procId);
            if (procIndex > -1) {
                clientes[clienteIndex].historicoProcedimentos[procIndex] = {
                    ...clientes[clienteIndex].historicoProcedimentos[procIndex],
                    data: data,
                    nomeServico: nomeServico,
                    valor: valor,
                    profissional: profissional || null,
                    observacoes: observacoes || null
                };
                showFeedback('feedback-procedimento', `✅ Procedimento atualizado com sucesso para ${clientes[clienteIndex].nome}!`, 'success');
            } else {
                showFeedback('feedback-procedimento', 'Erro: Procedimento não encontrado para atualização.', 'error');
                return;
            }
        } else { // Adicionando novo procedimento
            const novoProc = {
                id: Date.now().toString(), // Adiciona um ID único
                data: data,
                nomeServico: nomeServico,
                valor: valor,
                profissional: profissional || null,
                observacoes: observacoes || null
            };
            clientes[clienteIndex].historicoProcedimentos.push(novoProc);
            showFeedback('feedback-procedimento', `✅ Procedimento "${nomeServico}" adicionado com sucesso para ${clientes[clienteIndex].nome}!`, 'success');
        }
        
        salvarClientes(clientes);
        form.reset(); 
        document.getElementById('proc-id-edit').value = '';
        document.getElementById('btn-submit-procedimento').textContent = 'Adicionar Procedimento';
        exibirHistoricoDoCliente(clienteId); // Recarrega a lista para mostrar a alteração
    }

            document.getElementById('procData').value = procedimento.data;
            document.getElementById('procServico').value = procedimento.nomeServico;

            document.getElementById('procProfissional').value = procedimento.profissional;
            document.getElementById('procObs').value = procedimento.observacoes;
            document.getElementById('btn-submit-procedimento').textContent = 'Atualizar Procedimento';
            document.getElementById('feedback-procedimento').className = 'feedback-message';

    }

        showConfirmModal('Tem certeza que deseja excluir este procedimento do histórico do cliente?', () => {
            let clientes = getClientes();
            const clienteIndex = clientes.findIndex(c => c.id === clienteId);

        if (!telefoneLimpo) return '';
        const ddd = telefoneLimpo.substring(0, 2);
        const parte1 = telefoneLimpo.substring(2, 7);
        const parte2 = telefoneLimpo.substring(7, 11);
        return `(${ddd}) ${parte1}-${parte2}`;

    // EXTRATO FINANCEIRO
    const totalReceitasElement = document.getElementById('total-receitas');
    const totalDespesasElement = document.getElementById('total-despesas');
    const saldoAtualElement = document.getElementById('saldo-atual');
    const tabelaExtratoBody = document.getElementById('tabela-extrato-body');
    const filterPeriod = document.getElementById('filter-period');
    const filterDate = document.getElementById('filter-date');
    const filterDateContainer = document.getElementById('filter-date-container');
    const searchExtratoInput = document.getElementById('search-extrato');


    filterPeriod.addEventListener('change', () => {
        if (filterPeriod.value === 'day') {
            filterDateContainer.style.display = 'block';
            filterDate.valueAsDate = new Date(); // Define a data atual como padrão
        } else {
            filterDateContainer.style.display = 'none';
            filterDate.value = ''; // Limpa a data quando o filtro não é 'day'
        }
        carregarExtratoFinanceiro();
    });

    filterDate.addEventListener('change', () => {
        carregarExtratoFinanceiro();
    });

    searchExtratoInput.addEventListener('input', carregarExtratoFinanceiro); // Nova busca

    function carregarExtratoFinanceiro() {
        const todasReceitas = getReceitas();
        const todasDespesas = getDespesas();
        
        const periodoSelecionado = filterPeriod.value;
        const dataFiltro = filterDate.value ? new Date(filterDate.value + 'T00:00:00') : null;
        const searchTerm = searchExtratoInput.value.toLowerCase();

        let receitasFiltradas = [];
        let despesasFiltradas = [];

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0); // Zera hora para comparação de data

        if (periodoSelecionado === 'all') {
            receitasFiltradas = todasReceitas;
            despesasFiltradas = todasDespesas;
        } else {
            const getStartOfWeek = (date) => {
                const d = new Date(date);
                const day = d.getDay(); // 0 = Sunday, 1 = Monday, etc.
                const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Ajusta para segunda-feira (se quiser domingo, remova -6)
                d.setDate(diff);
                d.setHours(0, 0, 0, 0);
                return d;
            };

            const getEndOfWeek = (date) => {
                const d = getStartOfWeek(date);
                d.setDate(d.getDate() + 6);
                d.setHours(23, 59, 59, 999);
                return d;
            };

            const filterByDateRange = (itemDate, startDate, endDate) => {
                return itemDate >= startDate && itemDate <= endDate;
            };

            receitasFiltradas = todasReceitas.filter(r => {
                const dataLancamento = new Date(r.data + 'T00:00:00');
                dataLancamento.setHours(0, 0, 0, 0);

                if (periodoSelecionado === 'day') {
                    return dataFiltro && dataLancamento.toDateString() === dataFiltro.toDateString();
                } else if (periodoSelecionado === 'week') {
                    const startOfWeekFilter = getStartOfWeek(dataFiltro || hoje);
                    const endOfWeekFilter = getEndOfWeek(dataFiltro || hoje);
                    return filterByDateRange(dataLancamento, startOfWeekFilter, endOfWeekFilter);
                } else if (periodoSelecionado === 'month') {
                    const monthFilter = (dataFiltro || hoje).getMonth();
                    const yearFilter = (dataFiltro || hoje).getFullYear();
                    return dataLancamento.getMonth() === monthFilter && dataLancamento.getFullYear() === yearFilter;
                } else if (periodoSelecionado === 'year') {
                    const yearFilter = (dataFiltro || hoje).getFullYear();
                    return dataLancamento.getFullYear() === yearFilter;
                }
                return false;
            });

            despesasFiltradas = todasDespesas.filter(d => {
                const dataLancamento = new Date(d.data + 'T00:00:00');
                dataLancamento.setHours(0, 0, 0, 0);

                if (periodoSelecionado === 'day') {
                    return dataFiltro && dataLancamento.toDateString() === dataFiltro.toDateString();
                } else if (periodoSelecionado === 'week') {
                    const startOfWeekFilter = getStartOfWeek(dataFiltro || hoje);
                    const endOfWeekFilter = getEndOfWeek(dataFiltro || hoje);
                    return filterByDateRange(dataLancamento, startOfWeekFilter, endOfWeekFilter);
                } else if (periodoSelecionado === 'month') {
                    const monthFilter = (dataFiltro || hoje).getMonth();
                    const yearFilter = (dataFiltro || hoje).getFullYear();
                    return dataLancamento.getMonth() === monthFilter && dataLancamento.getFullYear() === yearFilter;
                } else if (periodoSelecionado === 'year') {
                    const yearFilter = (dataFiltro || hoje).getFullYear();
                    return dataLancamento.getFullYear() === yearFilter;
                }
                return false;
            });
        }

        // Aplicar filtro de busca no extrato
        let todosLancamentos = [...receitasFiltradas, ...despesasFiltradas];
        if (searchTerm) {
            todosLancamentos = todosLancamentos.filter(lancamento =>
                lancamento.descricao.toLowerCase().includes(searchTerm) ||
                lancamento.tipo.toLowerCase().includes(searchTerm) ||
                (lancamento.categoria && lancamento.categoria.toLowerCase().includes(searchTerm)) || // Apenas para despesas
                (lancamento.formaPagamento && lancamento.formaPagamento.toLowerCase().includes(searchTerm)) // Apenas para receitas
            );
        }

        let totalReceitas = 0;
        todosLancamentos.filter(l => l.tipo === 'receita').forEach(r => totalReceitas += r.valor);

        let totalDespesas = 0;
        todosLancamentos.filter(l => l.tipo === 'despesa').forEach(d => totalDespesas += d.valor);

        const saldoAtual = totalReceitas - totalDespesas;

        totalReceitasElement.textContent = `R$ ${totalReceitas.toFixed(2)}`;
        totalDespesasElement.textContent = `R$ ${totalDespesas.toFixed(2)}`;
        saldoAtualElement.textContent = `R$ ${saldoAtual.toFixed(2)}`;
        
        saldoAtualElement.className = saldoAtual >= 0 ? 'positive' : 'negative';

        // Preencher tabela do extrato
        tabelaExtratoBody.innerHTML = '';
        
        // Ordenar por data (mais recente primeiro)
        todosLancamentos.sort((a, b) => new Date(b.data) - new Date(a.data));

        if (todosLancamentos.length === 0) {
            const row = tabelaExtratoBody.insertRow();
            const cell = row.insertCell(0);
            cell.colSpan = 5; // Aumentado para 5 colunas
            cell.textContent = 'Nenhum lançamento financeiro registrado para o período e filtro selecionados.';
            cell.style.textAlign = 'center';
            cell.style.padding = '20px';
        } else {
            todosLancamentos.forEach(lancamento => {
                const row = tabelaExtratoBody.insertRow();
                const dataFormatada = new Date(lancamento.data + 'T00:00:00').toLocaleDateString('pt-BR');
                const valorFormatado = `R$ ${lancamento.valor.toFixed(2)}`;

                row.insertCell(0).textContent = dataFormatada;
                row.insertCell(1).textContent = lancamento.tipo.charAt(0).toUpperCase() + lancamento.tipo.slice(1); // Receita ou Despesa
                row.insertCell(2).textContent = lancamento.descricao;
                
                const valorCell = row.insertCell(3);
                valorCell.textContent = valorFormatado;
                valorCell.classList.add(lancamento.tipo === 'receita' ? 'receita-val' : 'despesa-val');

                // Botões de Ação
                const actionCell = row.insertCell(4);
                actionCell.innerHTML = `
                    <button class="edit" onclick="editar${lancamento.tipo.charAt(0).toUpperCase() + lancamento.tipo.slice(1)}('${lancamento.id}')" title="Editar">
                        <i class="ph-bold ph-pencil"></i>
                    </button>
                    <button class="delete" onclick="excluir${lancamento.tipo.charAt(0).toUpperCase() + lancamento.tipo.slice(1)}('${lancamento.id}')" title="Excluir">
                        <i class="ph-bold ph-trash"></i>
                    </button>
                `;
                actionCell.style.textAlign = 'center';
                actionCell.style.whiteSpace = 'nowrap';
            });
        }
    }
