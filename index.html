<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Desafio dos 60 Segundos 🧠</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fbe9e7, #f3e5f5);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      margin-bottom: 10px;
      color: #6a1b9a;
    }
    .info {
      font-size: 18px;
      margin: 10px 0;
    }
    .equacao {
      font-size: 32px;
      margin: 20px 0;
      font-weight: bold;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px;
      font-size: 18px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }
    button {
      background: #8e24aa;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #6a1b9a;
    }
    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🧠 Desafio dos 60 Segundos</h1>
  <div class="info">⏱️ Tempo: <span id="tempo">60</span>s | 🏆 Pontos: <span id="pontos">0</span></div>
  <div class="equacao" id="equacao">5 + 3 = ?</div>
  <input type="number" id="resposta" placeholder="Digite a resposta" autofocus>
  <button onclick="verificarResposta()">Responder</button>
  <p id="status"></p>
  <button onclick="iniciarJogo()" style="margin-top:20px;">🔁 Reiniciar</button>
</div>

<script>
  let tempo = 60;
  let pontos = 0;
  let timer;
  let respostaCorreta = 0;

  function gerarEquacao() {
    const op = ['+', '-', 'x'][Math.floor(Math.random() * 3)];
    let n1 = Math.floor(Math.random() * 10) + 1;
    let n2 = Math.floor(Math.random() * 10) + 1;

    // aumenta a dificuldade conforme os pontos
    if (pontos >= 5) {
      n1 = Math.floor(Math.random() * 20) + 10;
      n2 = Math.floor(Math.random() * 20) + 10;
    }

    let resultado;
    if (op === '+') resultado = n1 + n2;
    else if (op === '-') resultado = n1 - n2;
    else if (op === 'x') resultado = n1 * n2;

    document.getElementById('equacao').textContent = `${n1} ${op} ${n2} = ?`;
    respostaCorreta = resultado;
  }

  function verificarResposta() {
    const input = document.getElementById('resposta');
    const valor = parseInt(input.value);

    if (isNaN(valor)) return;

    if (valor === respostaCorreta) {
      pontos++;
      document.getElementById('status').textContent = "✅ Correto!";
    } else {
      tempo = Math.max(tempo - 2, 0); // tira 2s por erro
      document.getElementById('status').textContent = "❌ Errado!";
    }

    input.value = "";
    atualizarTela();
    gerarEquacao();
  }

  function atualizarTela() {
    document.getElementById('tempo').textContent = tempo;
    document.getElementById('pontos').textContent = pontos;
  }

  function iniciarJogo() {
    tempo = 60;
    pontos = 0;
    document.getElementById('status').textContent = "";
    gerarEquacao();
    atualizarTela();

    clearInterval(timer);
    timer = setInterval(() => {
      tempo--;
      atualizarTela();
      if (tempo <= 0) {
        clearInterval(timer);
        document.getElementById('status').textContent = `⏱️ Fim de jogo! Você fez ${pontos} ponto(s)!`;
      }
    }, 1000);
  }

  iniciarJogo();
</script>

</body>
</html>
