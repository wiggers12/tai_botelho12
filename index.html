<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Juntos no Mapa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f0ff;
      color: #333;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #6a1b9a;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: #8e24aa;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background-color: #6a1b9a;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }
    .user-list {
      margin-top: 20px;
    }
    .user-list li {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h1>📍 Juntos no Mapa</h1>

<div class="card">
  <label for="nome">Seu nome:</label>
  <input type="text" id="nome" placeholder="Ex: Ana, Lucas...">
  
  <button onclick="compartilharLocalizacao()">Compartilhar Localização</button>

  <div id="mapaContainer" style="display:none;">
    <h3>📌 Sua Localização Atual:</h3>
    <iframe id="mapa"></iframe>
  </div>
</div>

<div class="card">
  <h2>👥 Membros do Grupo</h2>
  <ul class="user-list" id="listaUsuarios"></ul>
</div>

<script>
  function compartilharLocalizacao() {
    const nome = document.getElementById('nome').value.trim();
    if (!nome) {
      alert("Digite seu nome para compartilhar.");
      return;
    }

    if (!navigator.geolocation) {
      alert("Geolocalização não é suportada neste navegador.");
      return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      const usuarios = JSON.parse(localStorage.getItem('usuariosMapa') || '[]');

      // Remove duplicado (mesmo nome)
      const atualizado = usuarios.filter(u => u.nome !== nome);
      atualizado.push({ nome, lat, lon, hora: new Date().toLocaleTimeString() });

      localStorage.setItem('usuariosMapa', JSON.stringify(atualizado));

      mostrarMapa(lat, lon);
      atualizarListaUsuarios();
    }, err => {
      alert("Erro ao obter localização: " + err.message);
    });
  }

  function mostrarMapa(lat, lon) {
    const mapa = document.getElementById('mapa');
    const mapaContainer = document.getElementById('mapaContainer');
    mapa.src = `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;
    mapaContainer.style.display = 'block';
  }

  function atualizarListaUsuarios() {
    const lista = document.getElementById('listaUsuarios');
    const usuarios = JSON.parse(localStorage.getItem('usuariosMapa') || '[]');
    lista.innerHTML = '';

    usuarios.forEach(u => {
      const li = document.createElement('li');
      li.innerHTML = `🧍 <strong>${u.nome}</strong> - Última localização às ${u.hora} 
      <br><a href="https://maps.google.com/maps?q=${u.lat},${u.lon}" target="_blank">Ver no mapa</a>`;
      lista.appendChild(li);
    });
  }

  atualizarListaUsuarios();
</script>

</body>
</html>
