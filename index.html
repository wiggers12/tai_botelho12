<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TK Joias - Gestão Financeira</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f2f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #7b1fa2;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #8e24aa;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
    }
    button:hover {
      background-color: #6a1b9a;
    }
    .painel {
      margin-top: 20px;
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    .registro {
      margin-top: 15px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    .registro-item {
      background: #f8f3fc;
      border-left: 5px solid #8e24aa;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }
    .titulo-secao {
      margin-top: 30px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

<h1>TK Joias 💎<br><small>Gestão Financeira - Thiago Monteiro</small></h1>

<div class="container">
  <label for="tipo">Tipo de Registro:</label>
  <select id="tipo">
    <option value="venda">Venda</option>
    <option value="despesa">Despesa</option>
  </select>

  <label for="descricao">Descrição:</label>
  <input type="text" id="descricao" placeholder="Ex: Aliança ouro 18k, Compra de material...">

  <label for="valor">Valor (R$):</label>
  <input type="number" id="valor" placeholder="Ex: 1250.00">

  <label for="peso">Peso (gramas):</label>
  <input type="number" id="peso" placeholder="Opcional (venda)">

  <label for="cliente">Cliente (opcional):</label>
  <input type="text" id="cliente" placeholder="Ex: Ana Souza">

  <button onclick="registrar()">Salvar Registro</button>

  <div class="painel">
    <h3>Painel Financeiro</h3>
    <p><strong>Total em Vendas:</strong> R$ <span id="totalVendas">0.00</span></p>
    <p><strong>Total em Despesas:</strong> R$ <span id="totalDespesas">0.00</span></p>
    <p><strong>Lucro Líquido:</strong> R$ <span id="lucro">0.00</span></p>
  </div>

  <div class="titulo-secao">📄 Registros</div>
  <div class="registro" id="listaRegistros"></div>
</div>

<script>
  let registros = JSON.parse(localStorage.getItem("tkjoiasRegistros") || "[]");

  function registrar() {
    const tipo = document.getElementById("tipo").value;
    const descricao = document.getElementById("descricao").value;
    const valor = parseFloat(document.getElementById("valor").value);
    const peso = document.getElementById("peso").value || null;
    const cliente = document.getElementById("cliente").value || null;

    if (!descricao || isNaN(valor)) {
      alert("Preencha a descrição e o valor corretamente.");
      return;
    }

    const novo = {
      tipo,
      descricao,
      valor,
      peso,
      cliente,
      data: new Date().toLocaleString()
    };

    registros.push(novo);
    localStorage.setItem("tkjoiasRegistros", JSON.stringify(registros));
    atualizarPainel();
    listarRegistros();

    document.getElementById("descricao").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("peso").value = "";
    document.getElementById("cliente").value = "";
  }

  function atualizarPainel() {
    const totalVendas = registros.filter(r => r.tipo === "venda").reduce((soma, r) => soma + r.valor, 0);
    const totalDespesas = registros.filter(r => r.tipo === "despesa").reduce((soma, r) => soma + r.valor, 0);
    const lucro = totalVendas - totalDespesas;

    document.getElementById("totalVendas").textContent = totalVendas.toFixed(2);
    document.getElementById("totalDespesas").textContent = totalDespesas.toFixed(2);
    document.getElementById("lucro").textContent = lucro.toFixed(2);
  }

  function listarRegistros() {
    const lista = document.getElementById("listaRegistros");
    lista.innerHTML = "";

    registros.slice().reverse().forEach(r => {
      const div = document.createElement("div");
      div.className = "registro-item";
      div.innerHTML = `
        <strong>${r.tipo === 'venda' ? '💰 Venda' : '📉 Despesa'}</strong><br>
        <em>${r.descricao}</em><br>
        Valor: R$ ${r.valor.toFixed(2)}<br>
        ${r.peso ? 'Peso: ' + r.peso + 'g<br>' : ''}
        ${r.cliente ? 'Cliente: ' + r.cliente + '<br>' : ''}
        <small>Data: ${r.data}</small>
      `;
      lista.appendChild(div);
    });
  }

  atualizarPainel();
  listarRegistros();
</script>

</body>
</html>
