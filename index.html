<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Espaço Tai Botelho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Variáveis de Cores */
    :root {
      --primary-color: #e91e63; /* Rosa Principal */
      --secondary-color: #9c27b0; /* Roxo Secundário */
      --accent-color: #fce4ec; /* Rosa Claro para fundos de seções */
      --text-color-dark: #4a4a4a; /* Cinza escuro para texto principal */
      --text-color-light: #ffffff; /* Branco para texto em fundos escuros */
      --bg-light: #fefefe; /* Branco muito suave para o corpo */
      --border-color: #e0e0e0; /* Cinza claro para bordas */
      --shadow-light: rgba(0, 0, 0, 0.05);
      --shadow-medium: rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-light); /* Fundo branco suave */
      margin: 0;
      padding: 0;
      color: var(--text-color-dark); /* Texto principal cinza escuro */
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--primary-color), #d81b60); /* Gradiente suave */
      color: var(--text-color-light);
      padding: 25px 20px; /* Mais padding */
      text-align: center;
      box-shadow: 0 4px 10px var(--shadow-medium); /* Sombra mais pronunciada */
      position: relative;
      overflow: hidden;
    }

    header::before { /* Efeito de fundo sutil no header */
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="40" fill="%23ffffff" fill-opacity="0.05" /></svg>') repeat;
      opacity: 0.8;
      z-index: 0;
    }

    header h1 {
      margin: 0;
      font-weight: 700; /* Mais encorpado */
      font-size: 3em; /* Um pouco maior */
      letter-spacing: 1px; /* Espaçamento entre letras */
      position: relative;
      z-index: 1;
    }

    h2 {
      color: var(--primary-color); /* Rosa principal */
      border-bottom: 2px solid var(--accent-color); /* Linha sutil rosa claro */
      padding-bottom: 12px;
      margin-top: 40px; /* Mais espaço acima */
      margin-bottom: 25px; /* Mais espaço abaixo */
      font-weight: 600;
      font-size: 1.8em;
      text-align: center;
    }

    main {
      max-width: 800px;
      margin: 30px auto; /* Mais margem */
      padding: 30px; /* Mais padding */
      background-color: var(--text-color-light); /* Fundo branco puro */
      border-radius: 12px; /* Cantos mais arredondados */
      box-shadow: 0 8px 20px var(--shadow-medium); /* Sombra mais suave e espalhada */
    }

    form {
      background-color: var(--accent-color); /* Fundo rosa claro */
      padding: 30px; /* Mais padding */
      border-radius: 10px; /* Cantos arredondados */
      max-width: 450px;
      margin: 30px auto; /* Centraliza o formulário */
      box-shadow: 0 5px 15px var(--shadow-light); /* Sombra suave */
      border: 1px solid var(--border-color); /* Borda fina e clara */
    }

    input, select {
      border: 1px solid var(--border-color); /* Borda cinza clara */
      border-radius: 6px; /* Cantos levemente mais arredondados */
      padding: 12px; /* Mais padding interno */
      margin-top: 8px;
      margin-bottom: 18px; /* Mais espaço abaixo */
      box-sizing: border-box;
      width: 100%;
      font-size: 1em;
      color: var(--text-color-dark);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus, select:focus {
      border-color: var(--primary-color); /* Borda rosa ao focar */
      box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.2); /* Sombra de foco sutil */
      outline: none; /* Remove o outline padrão */
    }

    button {
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); /* Gradiente nos botões */
      color: var(--text-color-light);
      padding: 15px 25px; /* Mais padding para botões maiores */
      border: none;
      border-radius: 8px; /* Cantos mais arredondados */
      cursor: pointer;
      font-size: 1.1em; /* Fonte um pouco maior */
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease; /* Transição de escala e sombra */
      width: 100%;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px); /* Leve levantamento */
      box-shadow: 0 6px 15px var(--shadow-medium); /* Sombra ao passar o mouse */
    }

    label {
      font-weight: 500;
      display: block;
      margin-bottom: 8px; /* Mais espaço abaixo do label */
      color: var(--text-color-dark);
    }

    /* Estilo para a seção de consulta de agendamentos */
    #consulta-agendamentos-section {
      background-color: var(--accent-color); /* Fundo rosa claro */
      padding: 30px;
      border-radius: 10px;
      max-width: 450px;
      margin: 30px auto;
      box-shadow: 0 5px 15px var(--shadow-light);
      border: 1px solid var(--border-color);
      display: none; /* Começa escondida */
    }

    /* Itens da lista de consulta de agendamentos */
    #lista-agendamentos-consulta li {
      background-color: var(--text-color-light); /* Fundo branco para os itens da lista */
      margin: 10px 0;
      padding: 18px; /* Mais padding */
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow-light); /* Sombra mais suave */
      border-left: 5px solid var(--primary-color); /* Linha colorida na esquerda */
      color: var(--text-color-dark);
      font-size: 0.95em;
      display: flex;
      flex-direction: column; /* Para empilhar as informações */
      align-items: flex-start;
      line-height: 1.5;
    }

    #lista-agendamentos-consulta li span {
      display: block; /* Cada parte da informação em uma nova linha */
      margin-bottom: 5px;
    }

    #lista-agendamentos-consulta li span:first-child {
        font-weight: 600;
        color: var(--primary-color);
    }

    #mensagem-confirmacao {
      text-align: center;
      padding: 15px;
      background-color: #e0ffe0; /* Verde claro */
      border: 1px solid #aaddaa;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 1.1em;
      font-weight: bold;
      color: #28a745; /* Verde mais escuro */
      box-shadow: 0 2px 5px rgba(40, 167, 69, 0.1);
    }

    /* Media Queries para responsividade */
    @media (max-width: 768px) {
      header h1 {
        font-size: 2.5em;
      }

      h2 {
        font-size: 1.5em;
      }

      main {
        margin: 20px 15px; /* Margem lateral em telas pequenas */
        padding: 20px;
      }

      form, #consulta-agendamentos-section {
        max-width: 100%;
        margin: 20px auto;
        padding: 20px;
      }

      button {
        padding: 12px 20px;
        font-size: 1em;
      }

      #lista-agendamentos-consulta li {
        padding: 15px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Espaço Tai Botelho</h1>
  </header>

  <main>
    <h2>📅 Agendar Atendimento</h2>
    <form id="form-agendamento">
      <label>Nome do Cliente:</label>
      <select id="cliente" required>
        <option value="">Selecione um cliente</option>
      </select>

      <label>Serviço:</label>
      <input type="text" id="servico" required>

      <label>Data e Hora:</label>
      <input type="datetime-local" id="datahora" required>

      <label>Profissional:</label>
      <input type="text" id="profissional" required>

      <button type="submit">Agendar</button>
    </form>

    <p id="mensagem-confirmacao"></p>
    
    <h2>👩‍🦰 Cadastro de Clientes</h2>
    <form id="form-cliente">
      <label>Nome:</label>
      <input type="text" id="nome-cliente" required>

      <label>Telefone:</label>
      <input type="tel" id="telefone-cliente" required>

      <button type="submit">Cadastrar Cliente</button>
    </form>

    <h2>🔍 Consultar Agendamentos</h2>
    <button id="mostrar-agendamentos">Mostrar Agendamentos</button>
    <div id="consulta-agendamentos-section">
      <ul id="lista-agendamentos-consulta"></ul>
      <button id="ocultar-agendamentos">Ocultar Agendamentos</button>
    </div>
    
  </main>

  <script>
    // AGENDAMENTO
    const form = document.getElementById('form-agendamento');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const cliente = document.getElementById('cliente').value;
      const servico = document.getElementById('servico').value;
      const datahora = document.getElementById('datahora').value;
      const profissional = document.getElementById('profissional').value;

      const agendamento = { cliente, servico, datahora, profissional };
      adicionarNaLista(agendamento); // Esta função continua presente, mas não faz nada visual
      salvarAgendamento(agendamento);
      form.reset();

      const mensagem = document.getElementById('mensagem-confirmacao');
      mensagem.textContent = `✅ Agendamento confirmado para ${cliente} em ${datahora} com ${profissional}.`;
      setTimeout(() => mensagem.textContent = '', 5000);

      const telefoneCliente = buscarTelefoneDoCliente(cliente);
      if (telefoneCliente) {
        const mensagemTexto = `Olá ${cliente}, seu agendamento para ${servico} com ${profissional} foi confirmado para ${datahora}.`;
        const linkWhatsApp = `https://wa.me/55${telefoneCliente.replace(/\D/g, '')}?text=${encodeURIComponent(mensagemTexto)}`;
        window.open(linkWhatsApp, '_blank');
      }
    });

    // Esta função agora não faz nada visualmente.
    function adicionarNaLista(agendamento) {
      // Agendamentos são salvos em 'salvarAgendamento'.
      // A exibição é controlada por 'exibirAgendamentosParaConsulta'.
    }

    function salvarAgendamento(agendamento) {
      const agendamentos = JSON.parse(localStorage.getItem('agendamentos')) || [];
      agendamentos.push(agendamento);
      localStorage.setItem('agendamentos', JSON.stringify(agendamentos));
    }

    // CLIENTES
    const formCliente = document.getElementById('form-cliente');

    formCliente.addEventListener('submit', function (e) {
      e.preventDefault();

      const nome = document.getElementById('nome-cliente').value;
      const telefone = document.getElementById('telefone-cliente').value;

      const cliente = { nome, telefone };
      adicionarClienteNaLista(cliente); // Esta função continua presente, mas não faz nada visual
      salvarCliente(cliente);
      formCliente.reset();
    });

    // Esta função agora não faz nada visualmente.
    function adicionarClienteNaLista(cliente) {
      // Clientes são salvos e o select é atualizado em 'salvarCliente'.
    }

    function salvarCliente(cliente) {
      const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
      clientes.push(cliente);
      localStorage.setItem('clientes', JSON.stringify(clientes));
      atualizarListaDeClientes();
    }

    function atualizarListaDeClientes() {
      const select = document.getElementById('cliente');
      if (!select) return;

      select.innerHTML = '<option value="">Selecione um cliente</option>';

      const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
      clientes.forEach(cliente => {
        const option = document.createElement('option');
        option.value = cliente.nome;
        option.textContent = cliente.nome;
        select.appendChild(option);
      });
    }

    function buscarTelefoneDoCliente(nome) {
      const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
      const cliente = clientes.find(c => c.nome === nome);
      return cliente ? cliente.telefone : '';
    }

    // NOVA FUNCIONALIDADE: CONSULTAR AGENDAMENTOS
    const btnMostrarAgendamentos = document.getElementById('mostrar-agendamentos');
    const btnOcultarAgendamentos = document.getElementById('ocultar-agendamentos');
    const consultaAgendamentosSection = document.getElementById('consulta-agendamentos-section');
    const listaAgendamentosConsulta = document.getElementById('lista-agendamentos-consulta');

    btnMostrarAgendamentos.addEventListener('click', () => {
      exibirAgendamentosParaConsulta();
      consultaAgendamentosSection.style.display = 'block'; // Mostra a seção
      btnMostrarAgendamentos.style.display = 'none'; // Esconde o botão "Mostrar"
    });

    btnOcultarAgendamentos.addEventListener('click', () => {
      consultaAgendamentosSection.style.display = 'none'; // Esconde a seção
      btnMostrarAgendamentos.style.display = 'block'; // Mostra o botão "Mostrar"
      listaAgendamentosConsulta.innerHTML = ''; // Limpa a lista ao ocultar
    });

    function exibirAgendamentosParaConsulta() {
      listaAgendamentosConsulta.innerHTML = ''; // Limpa a lista antes de preencher
      const agendamentos = JSON.parse(localStorage.getItem('agendamentos')) || [];
      if (agendamentos.length === 0) {
        const item = document.createElement('li');
        item.innerHTML = '<span>Nenhum agendamento encontrado.</span>'; /* Usando span para consistência */
        listaAgendamentosConsulta.appendChild(item);
      } else {
        agendamentos.forEach(agendamento => {
          const item = document.createElement('li');
          // Formatando a exibição para que cada informação fique em uma linha separada
          item.innerHTML = `
            <span>Cliente: ${agendamento.cliente}</span>
            <span>Serviço: ${agendamento.servico}</span>
            <span>Profissional: ${agendamento.profissional}</span>
            <span>Data e Hora: ${new Date(agendamento.datahora).toLocaleString('pt-BR')}</span>
          `;
          listaAgendamentosConsulta.appendChild(item);
        });
      }
    }

    // CARREGAR DADOS AO INICIAR
    window.addEventListener('load', () => {
      // As chamadas para adicionarNaLista e adicionarClienteNaLista foram removidas daqui,
      // pois as listas não são mais exibidas automaticamente ao carregar.
      atualizarListaDeClientes(); // Garante que o select de clientes é populado ao carregar
    });
  </script>

</body>
</html>
